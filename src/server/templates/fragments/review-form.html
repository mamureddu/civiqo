{# Review Form Fragment - Form to submit a review #}
{# Variables: business_id #}

<form hx-post="/api/businesses/{{ business_id }}/reviews"
      hx-target="#reviews-list"
      hx-swap="afterbegin"
      hx-on::after-request="this.reset()"
      class="bg-white rounded-lg p-4 border border-civiqo-gray-200 mb-4"
      x-data="{ rating: 0, hoverRating: 0 }">
    
    <h4 class="font-medium text-civiqo-gray-900 mb-4">Scrivi una recensione</h4>
    
    <!-- Star Rating Input -->
    <div class="mb-4">
        <label class="block text-sm font-medium text-civiqo-gray-700 mb-2">Valutazione</label>
        <div class="flex items-center space-x-1">
            {% for i in range(start=1, end=6) %}
            <button type="button"
                    @click="rating = {{ i }}"
                    @mouseenter="hoverRating = {{ i }}"
                    @mouseleave="hoverRating = 0"
                    class="focus:outline-none">
                <svg class="w-8 h-8 transition-colors"
                     :class="(hoverRating || rating) >= {{ i }} ? 'text-yellow-400' : 'text-civiqo-gray-300'"
                     fill="currentColor" viewBox="0 0 20 20">
                    <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
                </svg>
            </button>
            {% endfor %}
        </div>
        <input type="hidden" name="rating" :value="rating" required>
    </div>
    
    <!-- Title -->
    <div class="mb-4">
        <label for="review-title" class="block text-sm font-medium text-civiqo-gray-700 mb-1">
            Titolo (opzionale)
        </label>
        <input type="text" 
               id="review-title" 
               name="title"
               maxlength="255"
               class="w-full px-3 py-2 border border-civiqo-gray-200 rounded-lg focus:ring-2 focus:ring-civiqo-blue focus:border-civiqo-blue"
               placeholder="Riassumi la tua esperienza">
    </div>
    
    <!-- Content -->
    <div class="mb-4">
        <label for="review-content" class="block text-sm font-medium text-civiqo-gray-700 mb-1">
            La tua recensione
        </label>
        <textarea id="review-content" 
                  name="content"
                  rows="3"
                  class="w-full px-3 py-2 border border-civiqo-gray-200 rounded-lg focus:ring-2 focus:ring-civiqo-blue focus:border-civiqo-blue"
                  placeholder="Racconta la tua esperienza..."></textarea>
    </div>
    
    <!-- Submit -->
    <div class="flex justify-end">
        <button type="submit"
                :disabled="rating === 0"
                :class="rating === 0 ? 'bg-civiqo-gray-300 cursor-not-allowed' : 'bg-civiqo-blue hover:bg-civiqo-blue-dark'"
                class="px-4 py-2 text-white rounded-lg transition">
            Pubblica Recensione
        </button>
    </div>
</form>
