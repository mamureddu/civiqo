<!-- Toast Container - Include in base.html -->
<div x-data="toastSystem()" 
     x-on:toast.window="addToast($event.detail)"
     class="fixed bottom-4 right-4 z-[200] space-y-3 pointer-events-none">
    
    <template x-for="toast in toasts" :key="toast.id">
        <div x-show="toast.visible"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-y-2 scale-95"
             x-transition:enter-end="opacity-100 translate-y-0 scale-100"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-y-0 scale-100"
             x-transition:leave-end="opacity-0 translate-y-2 scale-95"
             class="pointer-events-auto max-w-sm w-full bg-white rounded-lg shadow-lg border overflow-hidden"
             :class="{
                 'border-civiqo-eco-green': toast.type === 'success',
                 'border-civiqo-coral': toast.type === 'error',
                 'border-civiqo-yellow': toast.type === 'warning',
                 'border-civiqo-blue': toast.type === 'info'
             }">
            <div class="p-4 flex items-start gap-3">
                <!-- Icon -->
                <div class="flex-shrink-0">
                    <!-- Success -->
                    <template x-if="toast.type === 'success'">
                        <svg class="w-5 h-5 text-civiqo-eco-green" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </template>
                    <!-- Error -->
                    <template x-if="toast.type === 'error'">
                        <svg class="w-5 h-5 text-civiqo-coral" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </template>
                    <!-- Warning -->
                    <template x-if="toast.type === 'warning'">
                        <svg class="w-5 h-5 text-civiqo-yellow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                        </svg>
                    </template>
                    <!-- Info -->
                    <template x-if="toast.type === 'info'">
                        <svg class="w-5 h-5 text-civiqo-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </template>
                </div>
                
                <!-- Content -->
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-civiqo-gray-900" x-text="toast.title" x-show="toast.title"></p>
                    <p class="text-sm text-civiqo-gray-600" x-text="toast.message"></p>
                </div>
                
                <!-- Close button -->
                <button @click="removeToast(toast.id)" 
                        class="flex-shrink-0 text-civiqo-gray-400 hover:text-civiqo-gray-600 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            
            <!-- Progress bar -->
            <div class="h-1 bg-civiqo-gray-100">
                <div class="h-full transition-all duration-100"
                     :class="{
                         'bg-civiqo-eco-green': toast.type === 'success',
                         'bg-civiqo-coral': toast.type === 'error',
                         'bg-civiqo-yellow': toast.type === 'warning',
                         'bg-civiqo-blue': toast.type === 'info'
                     }"
                     :style="'width: ' + toast.progress + '%'">
                </div>
            </div>
        </div>
    </template>
</div>

<script>
function toastSystem() {
    return {
        toasts: [],
        nextId: 0,
        
        addToast(detail) {
            const id = this.nextId++;
            const duration = detail.duration || 5000;
            
            const toast = {
                id,
                type: detail.type || 'info',
                title: detail.title || '',
                message: detail.message || '',
                visible: true,
                progress: 100
            };
            
            this.toasts.push(toast);
            
            // Animate progress bar
            const startTime = Date.now();
            const interval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                toast.progress = Math.max(0, 100 - (elapsed / duration * 100));
                
                if (elapsed >= duration) {
                    clearInterval(interval);
                    this.removeToast(id);
                }
            }, 50);
        },
        
        removeToast(id) {
            const toast = this.toasts.find(t => t.id === id);
            if (toast) {
                toast.visible = false;
                setTimeout(() => {
                    this.toasts = this.toasts.filter(t => t.id !== id);
                }, 300);
            }
        }
    };
}

// Helper function to show toasts
function showToast(type, message, title = '') {
    window.dispatchEvent(new CustomEvent('toast', {
        detail: { type, message, title }
    }));
}
</script>
