{% extends "base.html" %}

{% block title %}Attività Locali - Civiqo{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Header -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
        <div>
            <h1 class="text-3xl font-brand font-bold text-civiqo-gray-900">Attività Locali</h1>
            <p class="mt-2 text-civiqo-gray-600">Scopri e supporta le attività della tua community</p>
        </div>
        {% if logged_in %}
        <a href="/businesses/new" 
           class="inline-flex items-center px-6 py-3 bg-civiqo-blue text-white rounded-lg hover:bg-civiqo-blue-dark transition-colors shadow-sm">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Aggiungi Attività
        </a>
        {% endif %}
    </div>

    <!-- Search and Filters -->
    <div class="bg-white rounded-xl shadow-sm p-6 mb-6 border border-civiqo-gray-200">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="relative">
                <svg class="w-5 h-5 text-civiqo-gray-600 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                <input 
                    type="text" 
                    name="q"
                    placeholder="Cerca attività..." 
                    class="w-full pl-10 pr-4 py-2 border border-civiqo-gray-200 rounded-lg focus:ring-2 focus:ring-civiqo-blue focus:border-civiqo-blue"
                    hx-get="/htmx/businesses/search"
                    hx-trigger="keyup changed delay:500ms"
                    hx-target="#businesses-list"
                    hx-include="[name='category']"
                />
            </div>
            <select name="category"
                    class="px-4 py-2 border border-civiqo-gray-200 rounded-lg focus:ring-2 focus:ring-civiqo-blue focus:border-civiqo-blue"
                    hx-get="/htmx/businesses/search"
                    hx-trigger="change"
                    hx-target="#businesses-list"
                    hx-include="[name='q']">
                <option value="">Tutte le Categorie</option>
                <option value="food">Ristorazione</option>
                <option value="retail">Negozi</option>
                <option value="services">Servizi</option>
                <option value="healthcare">Salute</option>
                <option value="education">Formazione</option>
                <option value="arts">Arte e Cultura</option>
                <option value="recreation">Sport e Tempo Libero</option>
            </select>
            <select class="px-4 py-2 border border-civiqo-gray-200 rounded-lg focus:ring-2 focus:ring-civiqo-blue focus:border-civiqo-blue">
                <option value="">Ordina per</option>
                <option value="rating">Valutazione</option>
                <option value="reviews">Più Recensiti</option>
                <option value="newest">Più Recenti</option>
                <option value="name">Nome A-Z</option>
            </select>
        </div>
    </div>

    <!-- Businesses Grid -->
    <div id="businesses-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" 
         hx-get="/htmx/businesses/list" 
         hx-trigger="load" 
         hx-swap="innerHTML">
        <!-- Loading placeholders -->
        <div class="bg-white rounded-xl shadow-sm overflow-hidden animate-pulse border border-civiqo-gray-200">
            <div class="h-48 bg-civiqo-gray-200"></div>
            <div class="p-6 space-y-3">
                <div class="h-4 bg-civiqo-gray-200 rounded w-3/4"></div>
                <div class="h-4 bg-civiqo-gray-200 rounded w-1/2"></div>
            </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm overflow-hidden animate-pulse border border-civiqo-gray-200">
            <div class="h-48 bg-civiqo-gray-200"></div>
            <div class="p-6 space-y-3">
                <div class="h-4 bg-civiqo-gray-200 rounded w-3/4"></div>
                <div class="h-4 bg-civiqo-gray-200 rounded w-1/2"></div>
            </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm overflow-hidden animate-pulse border border-civiqo-gray-200">
            <div class="h-48 bg-civiqo-gray-200"></div>
            <div class="p-6 space-y-3">
                <div class="h-4 bg-civiqo-gray-200 rounded w-3/4"></div>
                <div class="h-4 bg-civiqo-gray-200 rounded w-1/2"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
