<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Community Manager{% endblock %}</title>
    
    <!-- TailwindCSS CDN (for now, will be replaced with build process) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Alpine.js for micro-interactions -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Custom styles -->
    <link rel="stylesheet" href="/static/styles/main.css">
    
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm" 
         hx-get="/api/nav" 
         hx-trigger="load" 
         hx-swap="innerHTML">
        <!-- Navigation will be loaded here -->
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="text-xl font-bold text-gray-800">Community Manager</div>
                <div class="text-sm text-gray-500">Loading...</div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t mt-12">
        <div class="container mx-auto px-4 py-6 text-center text-gray-600 text-sm">
            &copy; 2025 Community Manager. Built with Rust + HTMX + WASM.
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
