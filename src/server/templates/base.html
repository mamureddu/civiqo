<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Community Manager{% endblock %}</title>
    
    <!-- TailwindCSS CDN (for now, will be replaced with build process) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Alpine.js for micro-interactions -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Custom styles -->
    <link rel="stylesheet" href="/static/styles/main.css">
    
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <!-- Logo/Brand -->
                <div class="flex items-center space-x-6">
                    <a href="/" class="text-xl font-bold text-indigo-600 hover:text-indigo-700">
                        Community Manager
                    </a>
                    <div class="hidden md:flex space-x-4">
                        <a href="/communities" class="text-gray-700 hover:text-indigo-600">Communities</a>
                        <a href="/chat" class="text-gray-700 hover:text-indigo-600">Chat</a>
                    </div>
                </div>
                
                <!-- Auth Section -->
                <div class="flex items-center space-x-4">
                    {% if logged_in %}
                        <!-- Logged in user -->
                        <div class="flex items-center space-x-3">
                            {% if picture %}
                                <img src="{{ picture }}" alt="{{ username }}" class="w-8 h-8 rounded-full">
                            {% endif %}
                            <span class="text-gray-700 font-medium">{{ username }}</span>
                            <a href="/dashboard" class="text-indigo-600 hover:text-indigo-700">Dashboard</a>
                            <button 
                                onclick="logout()" 
                                class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                                Logout
                            </button>
                        </div>
                    {% else %}
                        <!-- Not logged in -->
                        <a href="/auth/login" 
                           class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">
                            Login
                        </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t mt-12">
        <div class="container mx-auto px-4 py-6 text-center text-gray-600 text-sm">
            &copy; 2025 Community Manager. Built with Rust + HTMX + WASM.
        </div>
    </footer>

    {% block scripts %}{% endblock %}
    
    <!-- Global scripts -->
    <script>
        async function logout() {
            try {
                const response = await fetch('/auth/logout', { 
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    window.location.href = '/';
                } else {
                    console.error('Logout failed');
                    alert('Logout failed. Please try again.');
                }
            } catch (error) {
                console.error('Logout error:', error);
                alert('Logout error. Please try again.');
            }
        }
    </script>
</body>
</html>
