{% extends "base.html" %}

{% block title %}Chat - {{ room_name }} - Community Manager{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto">
    <div class="bg-white rounded-lg shadow-sm overflow-hidden" style="height: calc(100vh - 200px);">
        <!-- Chat Header (HTMX) -->
        <div class="border-b p-4" 
             hx-get="/api/chat/{{ room_id }}/header" 
             hx-trigger="load"
             hx-swap="innerHTML">
            <div class="flex items-center justify-between">
                <h2 class="text-xl font-bold">{{ room_name }}</h2>
                <div class="text-sm text-gray-500">Loading...</div>
            </div>
        </div>

        <!-- Chat WASM Component -->
        <div id="chat-root" 
             class="h-full"
             data-room-id="{{ room_id }}"
             data-user-id="{{ user_id }}"
             data-ws-url="ws://localhost:9002/ws/chat/{{ room_id }}">
            <!-- WASM chat component will mount here -->
            <div class="flex items-center justify-center h-full text-gray-500">
                <div class="text-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
                    <p>Loading chat...</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
