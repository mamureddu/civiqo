{% extends "base.html" %}

{% block title %}{{ t.businesses_title }} - Civiqo{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Header -->
    <div class="mb-8">
        <nav class="mb-4">
            <a href="/businesses" class="text-civiqo-blue hover:underline focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-civiqo-blue focus-visible:ring-offset-2 rounded">← {{ t.action_back }}</a>
        </nav>
        <h1 class="text-3xl font-brand font-bold text-civiqo-gray-900">{{ t.businesses_title }}</h1>
        <p class="mt-2 text-civiqo-gray-600">{{ t.businesses_subtitle }}</p>
    </div>

    <!-- Form -->
    <form hx-post="/api/businesses" 
          hx-target="#form-result"
          hx-swap="innerHTML"
          class="bg-white rounded-xl shadow-sm border border-civiqo-gray-200 p-6 space-y-6">
        
        <div id="form-result"></div>

        <!-- Nome Attività -->
        <div>
            <label for="name" class="block text-sm font-medium text-civiqo-gray-700 mb-1">
                Nome Attività <span class="text-red-500">*</span>
            </label>
            <input type="text" 
                   id="name" 
                   name="name" 
                   required
                   maxlength="255"
                   class="w-full px-4 py-2 border border-civiqo-gray-200 rounded-lg focus:ring-2 focus:ring-civiqo-blue focus:border-civiqo-blue"
                   placeholder="Es. Panificio Da Mario">
        </div>

        <!-- Descrizione -->
        <div>
            <label for="description" class="block text-sm font-medium text-civiqo-gray-700 mb-1">
                Descrizione
            </label>
            <textarea id="description" 
                      name="description" 
                      rows="4"
                      class="w-full px-4 py-2 border border-civiqo-gray-200 rounded-lg focus:ring-2 focus:ring-civiqo-blue focus:border-civiqo-blue"
                      placeholder="Descrivi la tua attività, i prodotti o servizi che offri..."></textarea>
        </div>

        <!-- Categoria -->
        <div>
            <label for="category" class="block text-sm font-medium text-civiqo-gray-700 mb-1">
                Categoria
            </label>
            <select id="category" 
                    name="category"
                    class="w-full px-4 py-2 border border-civiqo-gray-200 rounded-lg focus:ring-2 focus:ring-civiqo-blue focus:border-civiqo-blue">
                <option value="">Seleziona una categoria</option>
                <option value="food">Ristorazione</option>
                <option value="retail">Negozi</option>
                <option value="services">Servizi</option>
                <option value="healthcare">Salute</option>
                <option value="education">Formazione</option>
                <option value="arts">Arte e Cultura</option>
                <option value="recreation">Sport e Tempo Libero</option>
            </select>
        </div>

        <!-- Indirizzo -->
        <div>
            <label for="address" class="block text-sm font-medium text-civiqo-gray-700 mb-1">
                Indirizzo
            </label>
            <input type="text" 
                   id="address" 
                   name="address"
                   class="w-full px-4 py-2 border border-civiqo-gray-200 rounded-lg focus:ring-2 focus:ring-civiqo-blue focus:border-civiqo-blue"
                   placeholder="Via Roma 1, 00100 Roma">
        </div>

        <!-- Contatti -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label for="phone" class="block text-sm font-medium text-civiqo-gray-700 mb-1">
                    Telefono
                </label>
                <input type="tel" 
                       id="phone" 
                       name="phone"
                       class="w-full px-4 py-2 border border-civiqo-gray-200 rounded-lg focus:ring-2 focus:ring-civiqo-blue focus:border-civiqo-blue"
                       placeholder="+39 06 1234567">
            </div>
            <div>
                <label for="email" class="block text-sm font-medium text-civiqo-gray-700 mb-1">
                    Email
                </label>
                <input type="email" 
                       id="email" 
                       name="email"
                       class="w-full px-4 py-2 border border-civiqo-gray-200 rounded-lg focus:ring-2 focus:ring-civiqo-blue focus:border-civiqo-blue"
                       placeholder="info@tuaattivita.it">
            </div>
        </div>

        <!-- Website -->
        <div>
            <label for="website" class="block text-sm font-medium text-civiqo-gray-700 mb-1">
                Sito Web
            </label>
            <input type="url" 
                   id="website" 
                   name="website"
                   class="w-full px-4 py-2 border border-civiqo-gray-200 rounded-lg focus:ring-2 focus:ring-civiqo-blue focus:border-civiqo-blue"
                   placeholder="https://www.tuaattivita.it">
        </div>

        <!-- Submit -->
        <div class="flex justify-end space-x-4 pt-4 border-t border-civiqo-gray-200">
            <a href="/businesses" 
               class="px-6 py-2 text-civiqo-gray-700 hover:bg-civiqo-gray-50 rounded-lg transition focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-civiqo-blue focus-visible:ring-offset-2">
                {{ t.action_cancel }}
            </a>
            <button type="submit" 
                    class="px-6 py-2 bg-civiqo-blue text-white rounded-lg hover:bg-civiqo-blue-dark transition focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-civiqo-blue focus-visible:ring-offset-2">
                {{ t.action_create }}
            </button>
        </div>
    </form>
</div>
{% endblock %}
