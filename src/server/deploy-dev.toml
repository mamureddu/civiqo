[build]
target = "x86_64-unknown-linux-gnu"

[deploy]
function_name = "community-manager-api-dev"
runtime = "provided.al2"
memory = 512
timeout = 30
iam_role = "arn:aws:iam::{{ACCOUNT_ID}}:role/lambda-execution-role"

[deploy.env]
file = "lambda-env/dev.env"

[deploy.api_gateway]
name = "community-manager-api-dev"
stage_name = "dev"

# CORS configuration for development
[[deploy.api_gateway.cors]]
allow_origins = ["http://localhost:3000"]
allow_methods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
allow_headers = ["Content-Type", "Authorization"]