# EC2 deployment configuration for Phase 2/3 scaling
# This will be used when migrating from Lambda to EC2 instances

[build]
target = "x86_64-unknown-linux-gnu"
features = ["ec2"]

[deploy.ec2]
instance_type = ["t3.nano", "t4g.nano"]
min_instances = 1
max_instances = 10
target_group_arn = "arn:aws:elasticloadbalancing:us-east-1:{{ACCOUNT_ID}}:targetgroup/chat-service-tg/{{TARGET_GROUP_ID}}"

[deploy.ec2.auto_scaling]
target_cpu_utilization = 70
scale_out_cooldown = 300
scale_in_cooldown = 300

[deploy.ec2.spot_fleet]
allocation_strategy = "diversified"
target_capacity = 2
spot_price = "0.01"  # Adjust based on current spot prices

[deploy.ec2.user_data]
script_path = "user-data.sh"

[deploy.env]
file = "lambda-env/prod.env"

[deploy.tags]
Environment = "production"
Service = "community-manager-chat"
DeploymentType = "ec2"