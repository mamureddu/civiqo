# cargo-lambda configuration for authorizer

[build]
# Target architecture (arm64 is cheaper and faster on AWS Lambda)
target = "aarch64-unknown-linux-gnu"

# Compiler flags for optimization
compiler = "cargo"

[deploy]
# Lambda function configuration
memory = 128  # MB - authorizer is lightweight
timeout = 5   # seconds - enough for token validation

# Environment variables (override with --env-file)
[deploy.env]
RUST_LOG = "info"

# Tags for AWS resources
[deploy.tags]
Project = "community-manager"
Component = "authorizer"
ManagedBy = "cargo-lambda"
