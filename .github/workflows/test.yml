name: Test Suite - rustls Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: community_manager_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Cache Cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          backend/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Install sqlx-cli
      run: cargo install sqlx-cli --no-default-features --features rustls,postgres

    - name: Set up test environment
      run: |
        cd backend
        cp .env.test .env
      env:
        TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/community_manager_test

    - name: Run database migrations
      run: |
        cd backend
        sqlx migrate run --database-url postgresql://postgres:postgres@localhost:5432/community_manager_test

    - name: Check code formatting
      run: |
        cd backend
        cargo fmt -- --check

    - name: Run Clippy
      run: |
        cd backend
        cargo clippy --workspace --all-targets --all-features -- -D warnings

    - name: Compile with rustls features
      run: |
        cd backend
        cargo check --workspace
        cargo build --workspace

    - name: Run unit tests
      run: |
        cd backend
        cargo test --workspace --lib
      env:
        TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/community_manager_test

    - name: Run rustls validation tests
      run: |
        cd backend
        cargo test --test rustls_validation
      env:
        TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/community_manager_test

    - name: Run integration tests
      run: |
        cd backend/api-gateway
        cargo test --test integration_tests
      env:
        TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/community_manager_test

    - name: Run shared library tests
      run: |
        cd backend/shared
        cargo test
      env:
        TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/community_manager_test

    - name: Test release build with rustls
      run: |
        cd backend
        cargo build --workspace --release

    - name: Run comprehensive test suite
      run: ./test-runner.sh
      env:
        TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/community_manager_test
        AUTH0_DOMAIN: test.auth0.com
        AUTH0_AUDIENCE: test-audience
        AUTH0_CLIENT_ID: test-client-id
        AUTH0_CLIENT_SECRET: test-client-secret

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Install cargo-audit
      run: cargo install cargo-audit
    - name: Run security audit
      run: |
        cd backend
        cargo audit

  rustls-specific-tests:
    name: rustls Specific Validation
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: community_manager_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          backend/target/
        key: ${{ runner.os }}-cargo-rustls-${{ hashFiles('**/Cargo.lock') }}

    - name: Verify rustls features are enabled
      run: |
        cd backend
        # Check that SQLx uses rustls
        cargo tree -p sqlx --features | grep rustls || (echo "SQLx not using rustls!" && exit 1)
        # Check that reqwest uses rustls
        cargo tree -p reqwest --features | grep rustls || (echo "reqwest not using rustls!" && exit 1)

    - name: Test rustls database connections under load
      run: |
        cd backend
        cargo test test_concurrent_rustls_connections --test rustls_validation -- --nocapture
      env:
        TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/community_manager_test

    - name: Test rustls error handling
      run: |
        cd backend
        cargo test test_rustls_error_handling --test rustls_validation -- --nocapture

    - name: Validate rustls compilation features
      run: |
        cd backend
        cargo test test_rustls_feature_compilation --test rustls_validation -- --nocapture

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: community_manager_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable

    - name: Install sqlx-cli
      run: cargo install sqlx-cli --no-default-features --features rustls,postgres

    - name: Run database migrations
      run: |
        cd backend
        sqlx migrate run --database-url postgresql://postgres:postgres@localhost:5432/community_manager_test

    - name: Run connection pool performance tests
      run: |
        cd backend
        cargo test test_rustls_connection_pool_behavior --test rustls_validation --release -- --nocapture
      env:
        TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/community_manager_test

    - name: Test concurrent database operations
      run: |
        cd backend
        cargo test test_concurrent_database_operations --test integration_tests --release -- --nocapture
      env:
        TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/community_manager_test

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: community_manager_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: llvm-tools-preview

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov

    - name: Install sqlx-cli
      run: cargo install sqlx-cli --no-default-features --features rustls,postgres

    - name: Run database migrations
      run: |
        cd backend
        sqlx migrate run --database-url postgresql://postgres:postgres@localhost:5432/community_manager_test

    - name: Generate code coverage
      run: |
        cd backend
        cargo llvm-cov --workspace --lcov --output-path lcov.info
      env:
        TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/community_manager_test

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: backend/lcov.info
        fail_ci_if_error: false